<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>School Schedule</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f0;
    --bg-tertiary: #eeede8;
    --bg-info: #e6f1fb;
    --bg-success: #eaf3de;
    --bg-warning: #faeeda;
    --bg-danger: #fcebeb;
    --text-primary: #1a1a18;
    --text-secondary: #5f5e5a;
    --text-info: #185fa5;
    --text-success: #3b6d11;
    --text-warning: #854f0b;
    --text-danger: #a32d2d;
    --border: rgba(0,0,0,0.12);
    --border-md: rgba(0,0,0,0.22);
    --radius-md: 8px;
    --radius-lg: 12px;
    --accent: #378ADD;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1e1e1c;
      --bg-secondary: #282825;
      --bg-tertiary: #323230;
      --bg-info: #0c447c;
      --bg-success: #27500a;
      --bg-warning: #633806;
      --bg-danger: #791f1f;
      --text-primary: #f0efe8;
      --text-secondary: #b4b2a9;
      --text-info: #85b7eb;
      --text-success: #97c459;
      --text-warning: #ef9f27;
      --text-danger: #f09595;
      --border: rgba(255,255,255,0.1);
      --border-md: rgba(255,255,255,0.2);
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg-tertiary);
    color: var(--text-primary);
    min-height: 100vh;
  }

  .app {
    padding: 1rem;
    max-width: 480px;
    margin: 0 auto;
    padding-bottom: 2rem;
  }

  h1 {
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 1rem;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 1rem;
  }
  .tab {
    flex: 1;
    padding: 8px 0;
    font-size: 13px;
    border: 0.5px solid var(--border-md);
    border-radius: var(--radius-md);
    background: transparent;
    cursor: pointer;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    font-family: inherit;
  }
  .tab.active {
    background: var(--bg-info);
    color: var(--text-info);
    border-color: transparent;
  }

  .clock-card {
    background: var(--bg-primary);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    margin-bottom: 1rem;
  }
  .period-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; }
  .period-name { font-size: 22px; font-weight: 500; margin-bottom: 2px; }
  .period-meta { font-size: 13px; color: var(--text-secondary); margin-bottom: 1rem; }
  .countdown { font-size: 48px; font-weight: 500; letter-spacing: -2px; }
  .progress-bar { height: 6px; background: var(--bg-secondary); border-radius: 3px; margin-top: 0.75rem; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 1s linear; }

  .week-tabs { display: flex; gap: 6px; margin-bottom: 1rem; }
  .wtab {
    flex: 1; padding: 7px 0; font-size: 13px;
    border: 0.5px solid var(--border-md); border-radius: var(--radius-md);
    background: transparent; cursor: pointer; color: var(--text-secondary); font-family: inherit;
  }
  .wtab.active { background: var(--accent); color: #fff; border-color: transparent; }

  .week-indicator { font-size: 12px; color: var(--text-secondary); text-align: center; margin-bottom: 0.75rem; }

  .day-row { display: flex; gap: 6px; margin-bottom: 0.75rem; align-items: flex-start; flex-wrap: wrap; }
  .day-label { font-size: 13px; font-weight: 500; width: 36px; flex-shrink: 0; color: var(--text-secondary); padding-top: 6px; display: flex; flex-direction: column; align-items: flex-start; gap: 3px; }
  .day-slots { display: flex; gap: 5px; flex-wrap: wrap; flex: 1; }
  .slot {
    font-size: 12px; padding: 5px 8px;
    border: 0.5px solid var(--border); border-radius: var(--radius-md);
    background: var(--bg-primary); cursor: pointer; color: var(--text-secondary);
  }
  .slot.lesson { background: var(--bg-info); color: var(--text-info); border-color: transparent; }
  .slot.break  { background: var(--bg-warning); color: var(--text-warning); border-color: transparent; }
  .slot.free   { background: var(--bg-success); color: var(--text-success); border-color: transparent; }
  .slot-label  { font-size: 10px; opacity: 0.7; }
  .slot-add    { font-size: 18px; line-height: 1; padding: 3px 8px; }

  .today-badge {
    font-size: 9px; background: var(--bg-danger); color: var(--text-danger);
    padding: 1px 4px; border-radius: 4px; white-space: nowrap;
  }

  .periods-list { margin-bottom: 1rem; }
  .period-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; border: 0.5px solid var(--border);
    border-radius: var(--radius-md); margin-bottom: 6px;
    background: var(--bg-primary);
  }
  .period-item .pname { font-size: 13px; font-weight: 500; flex: 1; }
  .period-item .ptime { font-size: 12px; color: var(--text-secondary); }
  .ptype { font-size: 11px; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
  .ptype.lesson  { background: var(--bg-info);    color: var(--text-info); }
  .ptype.break   { background: var(--bg-warning);  color: var(--text-warning); }
  .ptype.free    { background: var(--bg-success);  color: var(--text-success); }

  .add-btn {
    width: 100%; padding: 9px; font-size: 13px;
    border: 0.5px dashed var(--border-md); border-radius: var(--radius-md);
    background: transparent; cursor: pointer; color: var(--text-secondary);
    font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 6px;
  }

  .settings-row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 0.75rem;
    padding: 8px 10px; border: 0.5px solid var(--border); border-radius: var(--radius-md);
    background: var(--bg-primary);
  }
  .settings-row label { font-size: 13px; flex: 1; }
  .settings-row input[type=date] {
    font-size: 13px; padding: 4px 6px; border: 0.5px solid var(--border-md);
    border-radius: var(--radius-md); background: var(--bg-secondary);
    color: var(--text-primary); font-family: inherit;
  }

  .section-title {
    font-size: 11px; font-weight: 500; color: var(--text-secondary);
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 0.5rem; margin-top: 1rem;
  }

  .upcoming-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; border: 0.5px solid var(--border);
    border-radius: var(--radius-md); margin-bottom: 6px;
    background: var(--bg-primary);
  }

  /* Modal */
  .modal-bg {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    align-items: center; justify-content: center; z-index: 200;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--bg-primary); border-radius: var(--radius-lg);
    padding: 1.25rem; width: 300px; max-width: 90vw;
    border: 0.5px solid var(--border);
  }
  .modal h3 { font-size: 16px; font-weight: 500; margin-bottom: 1rem; }
  .field { margin-bottom: 0.75rem; }
  .field label { font-size: 12px; color: var(--text-secondary); display: block; margin-bottom: 4px; }
  .field input, .field select {
    width: 100%; padding: 7px 9px; font-size: 13px;
    border: 0.5px solid var(--border-md); border-radius: var(--radius-md);
    background: var(--bg-secondary); color: var(--text-primary); font-family: inherit;
  }
  .btn-row { display: flex; gap: 8px; margin-top: 1rem; }
  .btn {
    flex: 1; padding: 8px; font-size: 13px;
    border: 0.5px solid var(--border-md); border-radius: var(--radius-md);
    background: transparent; cursor: pointer; color: var(--text-primary); font-family: inherit;
  }
  .btn.primary { background: var(--accent); color: #fff; border-color: transparent; }
  .btn.danger  { color: var(--text-danger); border-color: var(--text-danger); }

  .no-school { text-align: center; padding: 2rem; color: var(--text-secondary); font-size: 14px; }
</style>
</head>
<body>
<div class="app">
  <h1><i class="ti ti-school" aria-hidden="true"></i> School Schedule</h1>

  <div class="tabs">
    <button class="tab active" onclick="showTab('today')"><i class="ti ti-clock" aria-hidden="true"></i> Today</button>
    <button class="tab" onclick="showTab('schedule')"><i class="ti ti-calendar" aria-hidden="true"></i> Schedule</button>
    <button class="tab" onclick="showTab('periods')"><i class="ti ti-list" aria-hidden="true"></i> Periods</button>
  </div>

  <!-- TODAY -->
  <div id="tab-today">
    <div class="clock-card">
      <div class="period-label" id="period-label">Loading…</div>
      <div class="period-name" id="period-name">—</div>
      <div class="period-meta" id="period-meta"></div>
      <div class="countdown" id="countdown">—</div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
    <div id="upcoming-list"></div>
  </div>

  <!-- SCHEDULE -->
  <div id="tab-schedule" style="display:none">
    <div class="week-tabs">
      <button class="wtab active" onclick="setEditWeek(1)" id="wtab1">Week A</button>
      <button class="wtab" onclick="setEditWeek(2)" id="wtab2">Week B</button>
    </div>
    <div class="week-indicator" id="week-indicator"></div>
    <div id="schedule-grid"></div>
  </div>

  <!-- PERIODS -->
  <div id="tab-periods" style="display:none">
    <div class="section-title">Periods &amp; Breaks</div>
    <div class="periods-list" id="periods-list"></div>
    <button class="add-btn" onclick="openAddPeriod()">
      <i class="ti ti-plus" aria-hidden="true"></i> Add period or break
    </button>
    <div class="section-title">Settings</div>
    <div class="settings-row">
      <label for="week-a-start">Week A started on</label>
      <input type="date" id="week-a-start" onchange="saveWeekAStart()" />
    </div>
    <p style="font-size:12px;color:var(--text-secondary);margin-top:0.5rem">
      Pick any Monday that was the start of a Week A. The app will auto-detect which week you're in.
    </p>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg">
  <div class="modal" id="modal-content"></div>
</div>

<script>
const DAYS = ['Sun','Mon','Tue','Wed','Thu'];
const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday'];

let state = {
  weekAStart: null,
  periods: [
    {id:1, name:'Period 1', start:'08:00', end:'08:50', type:'lesson'},
    {id:2, name:'Break',    start:'08:50', end:'09:05', type:'break'},
    {id:3, name:'Period 2', start:'09:05', end:'09:55', type:'lesson'},
    {id:4, name:'Period 3', start:'10:00', end:'10:50', type:'lesson'},
    {id:5, name:'Lunch',    start:'10:50', end:'11:30', type:'break'},
    {id:6, name:'Period 4', start:'11:30', end:'12:20', type:'lesson'},
    {id:7, name:'Period 5', start:'12:25', end:'13:15', type:'lesson'},
  ],
  schedule: {
    1: { Sun:[1,2,3,4,5,6,7], Mon:[1,2,3,4,5,6,7], Tue:[1,2,3,4,5,6], Wed:[1,2,3,4,5,6,7], Thu:[1,2,3,4,5,6,7] },
    2: { Sun:[1,2,3,4,5,6,7], Mon:[1,2,3,4,5,6,7], Tue:[1,2,3,4,5,6,7], Wed:[1,2,3,4,5,6], Thu:[1,2,3,4,5,6,7] }
  }
};

function load() {
  try { const s = localStorage.getItem('schoolSched2'); if(s) state = JSON.parse(s); } catch(e) {}
  if(state.weekAStart) document.getElementById('week-a-start').value = state.weekAStart;
}
function save() { localStorage.setItem('schoolSched2', JSON.stringify(state)); }
function getPeriodById(id) { return state.periods.find(p => p.id === id); }
function toMin(t) { const [h,m] = t.split(':').map(Number); return h*60+m; }
function fmt(secs) {
  const m = Math.floor(Math.abs(secs)/60);
  const s = Math.abs(secs) % 60;
  return (secs < 0 ? '-' : '') + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}
function nowMin() { const n = new Date(); return n.getHours()*60 + n.getMinutes() + n.getSeconds()/60; }

function getCurrentWeek() {
  if(!state.weekAStart) return 1;
  const start = new Date(state.weekAStart);
  const now = new Date();
  start.setHours(0,0,0,0); now.setHours(0,0,0,0);
  const diff = Math.floor((now - start) / (7*24*3600*1000));
  return (diff % 2 === 0) ? 1 : 2;
}

function getTodaySchedule() {
  const d = new Date().getDay();
  if(d === 5 || d === 6) return null;
  const dayKey = DAYS[d];
  const week = getCurrentWeek();
  const ids = state.schedule[week][dayKey] || [];
  return ids.map(id => state.periods.find(p => p.id === id)).filter(Boolean);
}

function updateClock() {
  const periods = getTodaySchedule();
  const nm = nowMin();

  if(!periods || periods.length === 0) {
    document.getElementById('period-label').textContent = 'Today';
    document.getElementById('period-name').textContent = 'No school today';
    document.getElementById('period-meta').textContent = '';
    document.getElementById('countdown').textContent = '—';
    document.getElementById('progress-fill').style.width = '0%';
    document.getElementById('upcoming-list').innerHTML = '';
    return;
  }

  let current = null, next = null;
  for(let i = 0; i < periods.length; i++) {
    const p = periods[i];
    const s = toMin(p.start), e = toMin(p.end);
    if(nm >= s && nm < e) { current = {...p, idx: i}; break; }
    if(nm < s && !next)   { next = {...p, idx: i}; }
  }

  if(!current && !next) {
    const last = periods[periods.length - 1];
    document.getElementById('period-label').textContent = 'School day ended';
    document.getElementById('period-name').textContent = 'All done!';
    document.getElementById('period-meta').textContent = 'Last: ' + last.name + ' ended at ' + last.end;
    document.getElementById('countdown').textContent = '—';
    document.getElementById('progress-fill').style.width = '100%';
    document.getElementById('upcoming-list').innerHTML = '';
    return;
  }

  const week = getCurrentWeek();
  const weekLabel = 'Week ' + (week === 1 ? 'A' : 'B');

  if(!current && next) {
    const secLeft = Math.round((toMin(next.start) - nm) * 60);
    document.getElementById('period-label').textContent = weekLabel + ' · Before school';
    document.getElementById('period-name').textContent = next.name + ' starts in';
    document.getElementById('period-meta').textContent = next.start + ' – ' + next.end;
    document.getElementById('countdown').textContent = fmt(secLeft);
    document.getElementById('progress-fill').style.width = '0%';
  } else if(current) {
    const sMin = toMin(current.start), eMin = toMin(current.end);
    const dur = (eMin - sMin) * 60;
    const elapsed = (nm - sMin) * 60;
    const secLeft = Math.round((eMin - nm) * 60);
    const pct = Math.min(100, Math.max(0, (elapsed / dur) * 100));
    const lessonNum = periods.slice(0, current.idx + 1).filter(p => p.type === 'lesson').length;
    const lbl = current.type === 'lesson'
      ? weekLabel + ' · Period ' + lessonNum
      : weekLabel + ' · ' + current.type;
    document.getElementById('period-label').textContent = lbl;
    document.getElementById('period-name').textContent = current.name;
    document.getElementById('period-meta').textContent = current.start + ' – ' + current.end + ' · ' + Math.ceil(secLeft/60) + ' min left';
    document.getElementById('countdown').textContent = fmt(secLeft);
    document.getElementById('progress-fill').style.width = pct + '%';
  }

  const nm2 = nowMin();
  const remaining = periods.filter(p => {
    if(current && p.id === current.id && p.start === current.start) return false;
    return toMin(p.start) > nm2;
  }).slice(0, 4);

  const upDiv = document.getElementById('upcoming-list');
  if(remaining.length) {
    upDiv.innerHTML = '<div class="section-title" style="margin-top:0">Up next</div>' +
      remaining.map(p => `
        <div class="upcoming-item">
          <span class="ptype ${p.type}">${p.type}</span>
          <span style="font-size:13px;font-weight:500;flex:1">${p.name}</span>
          <span style="font-size:12px;color:var(--text-secondary)">${p.start}–${p.end}</span>
        </div>`).join('');
  } else { upDiv.innerHTML = ''; }
}

let editWeek = 1;
function setEditWeek(w) {
  editWeek = w;
  document.getElementById('wtab1').className = 'wtab' + (w===1?' active':'');
  document.getElementById('wtab2').className = 'wtab' + (w===2?' active':'');
  renderScheduleGrid();
}

function renderScheduleGrid() {
  const week = getCurrentWeek();
  document.getElementById('week-indicator').textContent =
    'Week ' + (editWeek===1?'A':'B') + (editWeek===week?' (this week)':'');

  const grid = document.getElementById('schedule-grid');
  grid.innerHTML = '';
  DAYS.forEach((day, di) => {
    const ids = state.schedule[editWeek][day] || [];
    const todayFlag = (new Date().getDay() === di && editWeek === week);
    const row = document.createElement('div');
    row.className = 'day-row';
    const lbl = document.createElement('span');
    lbl.className = 'day-label';
    lbl.innerHTML = day + (todayFlag ? '<span class="today-badge">today</span>' : '');
    row.appendChild(lbl);

    const slots = document.createElement('div');
    slots.className = 'day-slots';
    ids.forEach(id => {
      const p = getPeriodById(id); if(!p) return;
      const s = document.createElement('div');
      s.className = 'slot ' + (p.type==='lesson'?'lesson':p.type==='break'?'break':'free');
      s.innerHTML = `<div style="font-weight:500">${p.name}</div><div class="slot-label">${p.start}</div>`;
      s.onclick = () => openSlotEdit(day, id, editWeek);
      slots.appendChild(s);
    });
    const add = document.createElement('div');
    add.className = 'slot slot-add';
    add.title = 'Add period';
    add.innerHTML = '<i class="ti ti-plus" aria-hidden="true"></i>';
    add.onclick = () => openAddSlot(day, editWeek);
    slots.appendChild(add);
    row.appendChild(slots);
    grid.appendChild(row);
  });
}

function renderPeriodsList() {
  document.getElementById('periods-list').innerHTML = state.periods.map(p => `
    <div class="period-item">
      <span class="ptype ${p.type}">${p.type}</span>
      <span class="pname">${p.name}</span>
      <span class="ptime">${p.start}–${p.end}</span>
      <button class="btn" style="flex:0;padding:4px 10px;font-size:12px" onclick="editPeriod(${p.id})">
        <i class="ti ti-edit" aria-hidden="true"></i>
      </button>
    </div>`).join('');
}

function showTab(t) {
  ['today','schedule','periods'].forEach(x => {
    document.getElementById('tab-'+x).style.display = x===t ? '' : 'none';
  });
  document.querySelectorAll('.tab').forEach((el,i) =>
    el.classList.toggle('active', ['today','schedule','periods'][i] === t));
  if(t==='schedule') renderScheduleGrid();
  if(t==='periods')  renderPeriodsList();
}

function openModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }

function openAddPeriod() {
  openModal(`
    <h3>Add period</h3>
    <div class="field"><label>Name</label><input id="m-name" placeholder="e.g. Maths" /></div>
    <div class="field"><label>Start time</label><input id="m-start" type="time" value="09:00" /></div>
    <div class="field"><label>End time</label><input id="m-end" type="time" value="09:50" /></div>
    <div class="field"><label>Type</label>
      <select id="m-type">
        <option value="lesson">Lesson</option>
        <option value="break">Break / Lunch</option>
        <option value="free">Free period</option>
      </select>
    </div>
    <div class="btn-row">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="savePeriod(null)">Save</button>
    </div>`);
}

function savePeriod(editId) {
  const name  = (document.getElementById('m-name').value.trim()) || 'Period';
  const start = document.getElementById('m-start').value;
  const end   = document.getElementById('m-end').value;
  const type  = document.getElementById('m-type').value;
  if(editId) {
    const p = state.periods.find(x => x.id === editId);
    if(p) { p.name=name; p.start=start; p.end=end; p.type=type; }
  } else {
    state.periods.push({id: Date.now(), name, start, end, type});
  }
  state.periods.sort((a,b) => toMin(a.start) - toMin(b.start));
  save(); closeModal(); renderPeriodsList();
}

function editPeriod(id) {
  const p = getPeriodById(id); if(!p) return;
  openModal(`
    <h3>Edit period</h3>
    <div class="field"><label>Name</label><input id="m-name" value="${p.name}" /></div>
    <div class="field"><label>Start time</label><input id="m-start" type="time" value="${p.start}" /></div>
    <div class="field"><label>End time</label><input id="m-end" type="time" value="${p.end}" /></div>
    <div class="field"><label>Type</label>
      <select id="m-type">
        <option value="lesson" ${p.type==='lesson'?'selected':''}>Lesson</option>
        <option value="break"  ${p.type==='break' ?'selected':''}>Break / Lunch</option>
        <option value="free"   ${p.type==='free'  ?'selected':''}>Free period</option>
      </select>
    </div>
    <div class="btn-row">
      <button class="btn danger" onclick="deletePeriod(${id})">Delete</button>
      <button class="btn primary" onclick="savePeriod(${id})">Save</button>
    </div>`);
}

function deletePeriod(id) {
  state.periods = state.periods.filter(p => p.id !== id);
  [1,2].forEach(w => DAYS.forEach(d => {
    state.schedule[w][d] = (state.schedule[w][d]||[]).filter(x => x !== id);
  }));
  save(); closeModal(); renderPeriodsList();
}

function openAddSlot(day, week) {
  const existing  = state.schedule[week][day] || [];
  const available = state.periods.filter(p => !existing.includes(p.id));
  if(!available.length) { alert('All periods are already added to this day.'); return; }
  openModal(`
    <h3>Add to ${DAY_NAMES[DAYS.indexOf(day)]} (Week ${week===1?'A':'B'})</h3>
    <div class="field"><label>Period</label>
      <select id="m-slot">${available.map(p=>`<option value="${p.id}">${p.name} (${p.start})</option>`).join('')}</select>
    </div>
    <div class="btn-row">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="addSlot('${day}',${week})">Add</button>
    </div>`);
}

function addSlot(day, week) {
  const id = parseInt(document.getElementById('m-slot').value);
  if(!state.schedule[week][day]) state.schedule[week][day] = [];
  state.schedule[week][day].push(id);
  state.schedule[week][day].sort((a,b) => {
    const pa = getPeriodById(a), pb = getPeriodById(b);
    return (pa && pb) ? toMin(pa.start) - toMin(pb.start) : 0;
  });
  save(); closeModal(); renderScheduleGrid();
}

function openSlotEdit(day, id, week) {
  const p = getPeriodById(id); if(!p) return;
  openModal(`
    <h3>${p.name}</h3>
    <p style="font-size:13px;color:var(--text-secondary);margin-bottom:1rem">
      ${DAY_NAMES[DAYS.indexOf(day)]}, Week ${week===1?'A':'B'} · ${p.start}–${p.end}
    </p>
    <div class="btn-row">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn danger" onclick="removeSlot('${day}',${id},${week})">Remove from day</button>
    </div>`);
}

function removeSlot(day, id, week) {
  state.schedule[week][day] = (state.schedule[week][day]||[]).filter(x => x !== id);
  save(); closeModal(); renderScheduleGrid();
}

function saveWeekAStart() {
  state.weekAStart = document.getElementById('week-a-start').value;
  save();
}

document.getElementById('modal-bg').addEventListener('click', function(e) {
  if(e.target === this) closeModal();
});

load();
updateClock();
setInterval(updateClock, 1000);
</script>
</body>
